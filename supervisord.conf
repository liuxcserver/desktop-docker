[supervisord]
nodaemon=true
# Supervisor 主进程由 entrypoint.sh 的 su 命令控制，这里不需要指定 user
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
childlogdir=/config/logs/supervisor

# ==================================================================
# 1. xrdp 服务 (必须 Root 绑定 3389 端口)
# ==================================================================
[program:xrdp]
command=/usr/sbin/xrdp
autostart=true
autorestart=true
# 👇 必须保留 Root 权限
user=root
redirect_stderr=true
stdout_logfile=NONE
stderr_logfile=NONE

# ==================================================================
# 2. xrdp-sesman (会话管理器)
# ==================================================================
[program:xrdp-sesman]
command=/usr/sbin/xrdp-sesman
autostart=true
autorestart=true
# 👇 通常也需要 Root 权限来管理会话
user=root
redirect_stderr=true
stdout_logfile=NONE
stderr_logfile=NONE

# 2. 启动 D-Bus
[program:dbus]
command=/usr/bin/dbus-daemon --system

# ==================================================================
# 3. x11vnc 服务 (必须是 AppUser)
# ==================================================================
[program:x11vnc]
command=/usr/bin/x11vnc -forever -shared -rfbport 5901 -display :99 -rfbauth /tmp/vnc.passwd -o /config/logs/x11vnc.log
autostart=true
autorestart=true
# 👇 关键：使用环境变量中的用户名，与 /config 目录拥有者一致
user=%(ENV_USER_NAME)s
directory=/config
redirect_stderr=true
stdout_logfile=NONE
stderr_logfile=NONE

# ==================================================================
# 4. Xfce4 桌面环境 (必须是 AppUser)
# ==================================================================
[program:xfdesktop]
# 注意：Xvfb 通常可以在普通用户下运行（除非需要特殊的显卡驱动，但这里用的是虚拟屏）
command=/bin/sh -c "Xvfb :99 -screen 0 1920x1080x24 & export DISPLAY=:99 && exec /usr/bin/xfce4-session"
autostart=true
autorestart=true
# 👇 必须与 x11vnc 保持一致
user=%(ENV_USER_NAME)s
directory=/config
redirect_stderr=true
stdout_logfile=/config/logs/xfce4-session.log
stderr_logfile=/config/logs/xfce4-session.err

# ==================================================================
# 5. noVNC Web 服务 (建议 AppUser)
# ==================================================================
[program:novnc]
command=/usr/share/novnc/utils/novnc_proxy --web /usr/share/novnc/ 6080 127.0.0.1:5901
autostart=true
autorestart=true
# 👇 监听 6080 (非特权端口)，可以由普通用户运行
user=%(ENV_USER_NAME)s
redirect_stderr=true
stdout_logfile=NONE
stderr_logfile=NONE